# le:1.0e-6 batch_size:64 epoch:6 GPU:8
### model
model_name_or_path: ./model/ViRC-7B-stage1
image_max_pixels: 12845056
image_min_pixels: 3136
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
freeze_vision_tower: true
freeze_multi_modal_projector: true
freeze_language_model: false
deepspeed: ./LLaMA-Factory/examples/deepspeed/ds_z3_config.json
dataloader_num_workers: 8

### dataset
media_dir: ./data/images
dataset_dir: ./data
dataset: ViRC_stage_2_PracSFT_scale_dynamic_50K
template: qwen2_vl
cutoff_len: 65536
overwrite_cache: true
preprocessing_num_workers: 64

### output
output_dir: ./model/ViRC-7B-stage2
logging_steps: 10
save_steps: 500
save_strategy: "epoch"
plot_loss: true
overwrite_output_dir: true
save_only_model: true
report_to: tensorboard

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-6
num_train_epochs: 6
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
max_grad_norm: 1

### eval
val_size: 0
per_device_eval_batch_size: 1
eval_strategy: "no"
eval_steps: 10000000

### accelerate
flash_attn: fa2
enable_liger_kernel: True
